<!DOCTYPE html>
<!-- Harness fixture: instrumentation WebView DOM for SVD/now-playing tests. Not used in production YT Music flow. -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YTM PoC Fixture</title>
</head>
<body>
  <!-- Local fixture mimicking minimal YT Music player-bar DOM for harness tests. -->
  <div id="poc-fixture" data-testid="ytm-poc-fixture">
    <ytmusic-player-bar>
      <div class="title ytmusic-player-bar-title" id="poc-track-title">California Dreamin'</div>
      <div class="byline" id="poc-track-artist">The Mamas &amp; The Papas</div>
      <button id="poc-play-button" aria-label="Pause">Pause</button>
    </ytmusic-player-bar>
    <span id="poc-is-playing" style="display:none">true</span>
  </div>
</body>
</html>
