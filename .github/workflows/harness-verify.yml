# Pre-push harness verification — mirrors HARNESS_RULES.md checklist.
name: Harness verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: harness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-harness:
    name: Python harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: harness/requirements.txt

      - name: Install harness dependencies
        run: pip install -r harness/requirements.txt

      - name: Sync fixtures
        run: python harness/scripts/sync_fixtures.py

      - name: LLM cushion bridge schema
        run: python harness/scripts/test_cushion_bridge_schema.py

      - name: Selector dictionary
        run: python harness/scripts/test_selector_dictionary.py

      - name: LLM response schema
        run: python harness/scripts/test_llm_response_schema.py

      - name: User request schema
        run: python harness/scripts/test_user_request_schema.py

      - name: B2B schedule schema
        run: python harness/scripts/test_b2b_schedule_schema.py

      - name: No baked API key
        run: python harness/scripts/test_no_baked_api_key.py

      - name: Release config scaffold
        run: python harness/scripts/verify_release_config.py

  android-unit-test:
    name: Android JVM unit tests
    runs-on: ubuntu-latest
    needs: python-harness
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Point Gradle at Android SDK
        run: echo "sdk.dir=${ANDROID_HOME}" > android/local.properties

      - name: Run JVM unit tests
        working-directory: android
        run: ./gradlew test --no-daemon

  android-instrumentation:
    name: Android instrumentation (WebView fixtures)
    runs-on: ubuntu-latest
    needs: android-unit-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Point Gradle at Android SDK
        run: echo "sdk.dir=${ANDROID_HOME}" > android/local.properties

      - name: Run connectedDebugAndroidTest on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          disable-animations: true
          script: cd android && ./gradlew connectedDebugAndroidTest --no-daemon
